<!DOCTYPE html>
<html xmlns:th="http://www,thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Movie</title>
</head>
<body>
    <h2 th:text="#{app.title}">Edit Movie</h2>
            <form th:action="@{/movies}" th:object="${movie}}" method="post">
                <input type="hidden" th:field="*{id}">

                <div>
                    <label th:text="#{movie.title}"></label>
                    <input type="text" th:field="*{title}"  /> <br>
                    <div style="color:red"
                    th:if="${#fields.hasErrors('title')}"
                    th:errors="*{title}">

                    </div>
                    <br>
                </div>

                <div>
                    <label th:text="#{movie.title}"></label>
                    <input type="text" th:field="*{genre}"  /> <br>
                </div>

                <div>
                    <label th:text="#{movie.genre}"></label>
                    <input type="number" step="0.1" th:field="*{rating}"  /> <br>
                </div>

                <div>
                    <label th:text="#{movie.duration}"></label>
                    <input type="text" th:field="*{duration}"  /> <br>
                </div>

                <div>
                    <label th:text="#{movie.releaseDate}"></label>
                    <input type="date" th:field="*{releaseDate}"  /> <br>
                </div>

    <button type="submit" th:text="#{button.save}">Save</button>
</form>

<a href="/movies">Back</a>

<style>
    body::before {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.12), transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.12), transparent 40%);
    animation: moveBackground 18s linear infinite;
    z-index: -1;
}

@keyframes moveBackground {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

a {
    color: #ffffff;
    text-decoration: none;
    transition: 0.3s;
}

a:hover {
    color: #00c6ff;
    text-shadow: 0 0 10px rgba(0,198,255,0.8);
}
</style>
</body>
</html>
